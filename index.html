<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataDial — AI admin assistant for medicine & beauty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Actay Wide alternative — via a similar geometric wide display face */
    @font-face {
      font-family: 'Actay Wide';
      src: local('Actay Wide Bold'), local('Neue Haas Grotesk'), local('Impact');
      font-weight: 700;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0A0A0A; }
    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      color: #F2F4F8;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .display {
      font-family: 'Actay Wide', 'Montserrat', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .mono {
      font-family: 'IBM Plex Mono', 'IBM Plex Sans', ui-monospace, monospace;
    }
    .dd-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 34px -10px rgba(106,75,235,0.7), inset 0 1px 0 rgba(255,255,255,0.3) !important; }
    .dd-btn-ghost:hover { border-color: rgba(255,255,255,0.3) !important; background: rgba(255,255,255,0.08) !important; }
    .dd-link { color: #BFBFC7; text-decoration: none; transition: color .2s; }
    .dd-link:hover { color: #fff; }
    .feature-card { transition: border-color .25s, transform .25s; }
    .feature-card:hover { border-color: rgba(113,119,246,0.6); transform: translateY(-2px); }
    .faq-item button:hover { color: #fff !important; }
    /* scrollbars on dark */
    ::selection { background: #6A4BEB; color: #fff; }
    @media (max-width: 900px) {
      .hide-mobile { display: none !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .two-col { grid-template-columns: 1fr !important; }
      .three-col { grid-template-columns: 1fr !important; }
      .stats-row { grid-template-columns: 1fr 1fr !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="src/shaders.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/ShaderCanvas.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/ChatMockup.jsx"></script>
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
